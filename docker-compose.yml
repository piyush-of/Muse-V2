version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: muse_postgres
    restart: always
    environment:
      POSTGRES_USER: muse
      POSTGRES_PASSWORD: musepassword
      POSTGRES_DB: muse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
